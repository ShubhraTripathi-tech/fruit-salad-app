<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fruity Fruit</title>
    <script defer src="./script.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <section id="inputSection">
      <form>
        <label for="fruitInput">Enter fruit name</label>
        <input
          name="fruit"
          id="fruitInput"
          type="text"
          placeholder="e.g. banana"
          required
        />
        <button type="submit" value="submit">Submit</button>
        <input type="text" />
      </form>
    </section>

    <section id="fruitSection">
      <ul></ul>
    </section>

    <section id="nutritionSection">
      <p></p>
    </section>
    <section>
      <form>
        <label for="Enter a new fruit">Add a new fruit</label><br />
        <label for="Fruit genus">Genus:</label><br />
        <input type="text" id="fruitGenus" name="fruitGenus" /><br />
        <label for="Fruit name">Name:</label><br />
        <input type="text" id="fruitName" name="fruitName" /><br />
        <label for="Fruit family">Family:</label><br />
        <input type="text" id="fruitFamily" name="fruitFamily" /><br />
        <label for="Fruit order">Order:</label><br />
        <input type="text" id="fruitOrder" name="fruitOrder" /><br />
        <label for="Nutritions">Nutritions:</label><br />
        <label for="carbohydrates">carbohydrates:</label><br />
        <input type="text" id="carbs" name="carbs" /><br />
        <label for="protein">protein:</label><br />
        <input type="text" id="protein" name="protein" /><br />
        <label for="fat">fat:</label><br />
        <input type="text" id="fat" name="fat" /><br />
        <label for="calories">calories:</label><br />
        <input type="text" id="calories" name="calories" /><br />
        <label for="sugar">sugar:</label><br />
        <input type="text" id="sugar" name="sugar" /><br />
      </form>
    </section>
    <section>
      <img
        id="fruityFooter"
        src="https://img.freepik.com/premium-photo/different-fruits-isolated-white-background-with-copy-space_88281-2246.jpg?w=1380"
      />
    </section>
  </body>
</html>
